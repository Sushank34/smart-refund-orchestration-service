name: keep-alive

# Pings the deployed /health endpoint so the free Render instance doesn't spin
# down after ~15 min idle. Also doubles as a basic uptime check — the job fails
# (and notifies you) if /health doesn't return 200.
#
# Note: GitHub's scheduled crons can be delayed under load, so the instance may
# occasionally still nap. For strict timing, use an external pinger (cron-job.org).

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="https://smart-refund-orchestration-service.onrender.com/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL")
          echo "GET $URL -> HTTP $code"
          test "$code" = "200"
