# Server — uses the platform-provided PORT in the cloud (Render, Cloud Run, etc.),
# falling back to 8085 locally.
server.port=${PORT:8085}

# In-memory H2 — zero infra. Console at http://localhost:8085/h2-console (jdbc:h2:mem:refunds)
spring.datasource.url=jdbc:h2:mem:refunds;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Business config (overridable without recompiling)
refund.approval-threshold-cents=100000
refund.risk.high-threshold=70
refund.risk.medium-threshold=30
